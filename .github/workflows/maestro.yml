name: Maestro E2E

# Quality gate: runs tsc/lint/jest always, and the Maestro flows in .maestro/ against a
# build in Maestro Cloud once the MAESTRO_CLOUD_API_KEY secret exists. Until then the cloud
# job is skipped (no red X on every PR). See .maestro/ for the flows + EAS-UPDATE.md.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gates:
    name: tsc · lint · jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test -- --ci

  # secrets can't be read in a job-level `if`, so surface presence as an output here.
  check-secret:
    name: Check Maestro Cloud key
    runs-on: ubuntu-latest
    outputs:
      has-key: ${{ steps.check.outputs.has-key }}
    steps:
      - id: check
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
        run: |
          if [ -n "$MAESTRO_CLOUD_API_KEY" ]; then
            echo "has-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-key=false" >> "$GITHUB_OUTPUT"
          fi

  maestro-cloud:
    name: Maestro Cloud flows
    runs-on: ubuntu-latest
    needs: [gates, check-secret]
    if: needs.check-secret.outputs.has-key == 'true'
    steps:
      - uses: actions/checkout@v4
      # Build/locate the .app or .apk to test, then upload to Maestro Cloud.
      # Replace app-file with the artifact produced by your EAS/native build step.
      - uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: app.zip
          workspace: .maestro
          env: |
            SUBDOMAIN=acme
            EMAIL=manager@hbs.com
            PASSWORD=${{ secrets.MAESTRO_TEST_PASSWORD }}
